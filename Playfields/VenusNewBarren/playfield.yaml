---
#---------------------------------------------------------
# Venus   
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html
# For more detailed explanations of the different parameters, see examples in Empyrion\Content\Playfields\ExamplePlanet and ExampleSpace
# Please do not use long comments here because in a multiplayer game the yaml file has to be sent from server to client 

# Playfield Characteristics
RealRadius: 1303.797294             
ScaledRadius: 1300                  
Gravity: -4.86                      
AtmosphereDensity: 1.377            
AtmosphereO2: 0.05                  
AtmosphereBreathable: False         
Temperature: 90
TemperatureDay: 170                 
TemperatureNight: 40              
Music: StellarGrasp
Radiation: 2.9
DayLength: 24
PlanetType: Barren               
Moons: 0                         
PvP: True                        
Seed: 123456                    
#UseFixed: False 

# Playfield difficulty (has impact on experience gains)
Difficulty: 3                   

# Planet or Space
PlayfieldType: Moon           
Description: "Venus ist der 2te Planet des Sonnensystems.\n
              Ein heisser, trockner Planet ohne Wasser , ohne Leben. Eine giftige  Atmosphaere\n
             "

# Sun                           
SunFlare: EnvironmentalEffects/SunFlareBlue

# Atmosphere and Sky
AtmosphereEnabled: True             
AtmosphereColor: "0.19, 0.26, 0.35" 
SkyColor: "0.6, 1, 0.1"             
SkyHorizonColor: "0.3, 1, 0"        

# Light
DayLightIntensity: 1.20             
NightLightIntensity: 0.65           
LightZenithColor: "1, 0.9, 0.8"     
LightHorizonColor: "1, 0.5, 0"      
#LightZenithColor: "1, 0.9, 0.8"    
#LightHorizonColor: "1, 0.6, 0"     
NightLightColor: "0.5, 0.78, 0.16"  
DayShadowStrength: 0.95              

# Fog
AtmosphereFog: 0.60
FogColor: "0.6, 1, 0.1"
FogCloudIntensity: 0.7
FogIntensity: 0.5                    
FogStartDistance: 300
GroundFogIntensity: 0.45             
GroundFogHeight: 300

# Clouds
CloudsDensity: 1                     
CloudsSharpness: 1                   
CloudsBrightness: 1                  
CloudsOpacity: 0.3                   
CloudsZenithColor: "0.6, 1, 0.1"   
CloudsHorizonColor: "0, 1, 0"  

# Wind Speed
WindSpeed: 3                   

# Special Effects              
SpecialEffectsLocal:
  - Name: Grime
    Biome: [ BarrenFog ]
    Time: Always
    MaxHeight: 40

SpecialEffectsGlobal:
# Weather
  - Name: CloudsMedium
    Type: Weather
    InitialDelay: 0   
    Delay: 2
    Lifetime: 1200
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 0   
    Delay: 2
    Lifetime: 1200
  - Name: Wind
    Type: Weather
    InitialDelay: 0   
    Delay: 5
    Lifetime: 600
  - Name: HeatWave
    Type: Weather
    InitialDelay: 48   
    Delay: 24          
    Lifetime: 1200
  - Name: FogRadiationGreen
    Type: Weather
    InitialDelay: 10 
    Delay: 5 
    Lifetime: 1000 
  - Name: AcidRainHeavy
    Type: Weather
    InitialDelay: 48   
    Delay: 24         
    Lifetime: 600    
# Global Effect
  - Name: MeteorShower
    Biome: [ BarrenOpenPlains ]
    Time: Always
    InitialDelay: 3.5   
    Delay: 5
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid
  - Name: ThunderAndLightning
    Biome: [ Any ]
    Time: Always
    InitialDelay: 0.5   
    Delay: 8
    Lifetime: 300			
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid

### Terrain and Decorations
# Terrain and Local Decoration
Terrain:
    Name: NewBarren
    PoleLevel: 60                      
    NoiseStrength: 1
    ColorChange:
        YFadeCenter: 40
        YFadeRange: 30
        YFadeMin: 0.1
        YFadeMax: -0.05

MainBiome:
    Textures:
        - [ DirtCliff, 2 ]
        - [ Cliff, 4 ]   
        - [ RockBrown01, 0 ]
        - [ Bedrock, 2 ]

# Biome Definition and Main Decoration
Biome:
# Foggy area
   - Altitude: [ 1, 45 ]
     Slope: [ 0, 12 ]
     BiomeClusterData: 
         - Name: "BarrenFog"
           Id: 1
           Splat1: [0, 0, 0, 1]
           Splat2: [0, 0, 0, 0]
           ClusterSize: 0
           NbOfClusters: 0
           Temperature: 100
           Radiation: 8
           Decorations: 
               - [ CoralStone01-03, 10]
               - [ CoralStone01-05, 10]
               - [ CrystalsPyramidBlue, 10]
# ===================================================
# Main biome: flat
   - Altitude: [ 43, 70 ]
     Slope: [ 0, 15 ]
     BiomeClusterData: 
         - Name: "BarrenOpenPlains"
           Id: 2
           ClusterSize: 50
           NbOfClusters: 2
           Decorations: 
               - [ RealRock4, 0.5]
               - [ RealRock5, 0.5]
               - [ RealRock6, 0.5]  
           Grass:
               - Name: "GrassBrown02c"
                 Density: 1000
                 YScale: 0.8
                 Preset: "GrassDense2"
         - Name: "BarrenOpenPlains"
           Id: 2
           ClusterSize: 0
           NbOfClusters: 0
           Decorations: 
               - [ Pillar1, 0.01]
               - [ Pillar2, 0.01]
               - [ Pillar3, 0.007]
               - [ RealRock8, 0.01]
               - [ RealRock9, 0.01]   
   - Altitude: [ 43, 100 ]
     Slope: [ 0, 180 ]
     BiomeClusterData:
         - Name: "BarrenOpenPlains"
           Id: 2
           ClusterSize: 0
           NbOfClusters: 0
           Decorations: 
               - [ RealRock1, 0]
               - [ "GasEmitter2", 0.1]  
# ===================================================
   - Altitude: [ 100, 200 ]
     Slope: [ 0, 20 ]
     BiomeClusterData:
         - Name: "Mountains"
           Id: 3
           ClusterSize: 0
           NbOfClusters: 0
           Decorations: 
               - [ RealRock1, 0]
               - [ "GasEmitter2", 0.1]  
### Resource Deposits
RandomResources:
    - Name: IronResource #small
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 10, 12 ]
      DepthMinMax: [ 0, 10 ]
      DroneProb: 0.9
      MaxDroneCount: 2
      DistTypeCylinder:
        MaxRadius: 10
        YVariance: 18

    - Name: PromethiumResource #small
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 5, 10 ]
      DepthMinMax: [ 0, 1 ]
      DroneProb: 0.7
      MaxDroneCount: 2
      DistTypeCylinder:
        MaxRadius: 8
        YVariance: 12

    - Name: SiliconResource # medium
      CountMinMax: [ 4, 8 ]
      SizeMinMax: [ 9, 10 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 0.2
      MaxDroneCount: 2
      DistTypeWorm:
        FreqDirChange: 0.5  
        DirChangeMagnitude: 0.2 
        MaxLength: 50
        DeepnessType: 1    

    - Name: NeodymiumResource #rich
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 7, 9 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 1
      MaxDroneCount: 4   
      DistTypeCylinder:
        MaxRadius: 15
        YVariance: 12

### Resource Asteroids
AsteroidResources:
     - Name: NeodymiumResource
       Threshold: 0.2
       Amount: 0.25

     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.27

     - Name: PromethiumResource
       Threshold: 0.2
       Amount: 0.22

### POIs
POIs:
    Random:                
        - GroupName: MiningComplex
          CountMinMax: [ 1, 2 ]         
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 4
          TroopTransport: False
          SpawnPOIAvoid: [TS_Skillon]  
          POIDistance: 1000        
          Properties: 
            - Key: Music
              Value: DarkSoundscape3       

        - GroupName: CrashedShip      # Do not use regeneration with burried POIs
          CountMinMax: [ 1, 2 ]
          DroneProb: 0.8
          DronesMinMax: [ 1, 4 ]
          ReserveCount: 4
          TroopTransport: False
          POIDistance: 800   
          Properties: 
            - Key: MapMarker 
              Value: Neutral    

        - GroupName: DroneBaseAkua
          DroneBaseSetup: Starter Drone Base
          CountMinMax: [2, 4]
          DroneProb: 1
          DronesMinMax: [5, 7]
          ReserveCount: 5
          TroopTransport: False
          InitPower: True
          SpawnPOINear: []
          SpawnPOIAvoid: [DroneBaseAkua]
          SpawnResource: []
          Properties:
            - Key: Music
              Value: alien2
            - Key: RegenAfter
              Value: 720

    FixedPlayerStart:
        - Mode: Debug
          Pos: [ -835, 165, -1000 ]
          RotY: 125

### Drones
DroneBaseSetup:
    Random:
        - GroupName: DroneBaseSetup
          DronesMinMax: [ 2, 3 ] 
          ReserveCount: 5 
          DroneProb: 1.0  
          Difficulty: 6 
          PresetStyle: 1 
          # BaseAttack: DroneSmallAttackBase
          Stock:
              - Name: DroneSmallFast01Plasma
                Amount: 200
                Extra: 0    

              - Name: DroneLargeSlow01Plasma
                Amount: 200
                Extra: 0

              - Name: DroneLargeSlow02Minigun
                Amount: 200
                Extra: 0

              - Name: DroneLargeSlow02Cannon
                Amount: 200
                Extra: 0

          PlanetVesselBase:
              Name: PlanetVesselBaseSetup
              Position3D: [ 0, 102, 0]
              BaseType: PlanetVesselBase
              KeyId: 0                  
              PlanetVessel:
                - Name: Patrol-S-Medium      
                  Mission: PlanetPatrol
                  FixedMaxSpeed: 5         
                  RangePatrolCenter: [ 1500, 0 ]
                  RangePatrolRadius: 800
                  RangePatrolAltitude: 60
                  RespawnDelay: 12

DroneSpawning:
    Random:
        - DronesMinMax: [ 5, 10 ]
          CenterX: -2500
          Radius: 1500

        - DronesMinMax: [ 5, 10 ]
          CenterX: 2500
          Radius: 1500

### Creatures
