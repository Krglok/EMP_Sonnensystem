### POIs
POIs:
    Random:    
        - GroupName: CrashedShip
          CountMinMax: [ 1, 2 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 4
          TroopTransport: False
          Properties: 
            - Key: MapMarker 
              Value: Neutral    

    FixedPlayerStart:
        - Mode: Debug
          Pos: [ -120, 80, 450 ]
          RotY: 125   

### Drones
DroneBaseSetup:
    Random:
          PlanetVesselBase:
              Name: PlanetVesselBaseSetup
              Position3D: [ 0, 102, 0]
              BaseType: PlanetVesselBase
              KeyId: 0                  # Unique Key Id
              PlanetVessel:
                - Name: Patrol-XS-Hard           # GroupName
                  Mission: PlanetPatrol
                  FixedMaxSpeed: 10          # Max speed of a freighter in m/sec
                  RangePatrolCenter: [ -1500, 0 ]
                  RangePatrolRadius: 800
                  RangePatrolAltitude: 80
                  RespawnDelay: 12

DroneSpawning:
    Random:
        - DronesMinMax: [ 5, 10 ]
          CenterX: -2500
          Radius: 1500

        - DronesMinMax: [ 5, 10 ]
          CenterX: 2500
          Radius: 1500

