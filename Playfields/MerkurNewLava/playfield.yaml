### Resource Deposits
RandomResources:
    - Name: IronResource
      CountMinMax: [ 1, 3 ] 
      SizeMinMax: [ 6, 9 ] 
      DepthMinMax: [ 0, 1 ]
      DroneProb: 0.4  
      MaxDroneCount: 0
      DistTypeCylinder:
        MaxRadius: 15
        YVariance: 10

    - Name: PromethiumResource
      CountMinMax: [ 2, 4 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 0, 1 ]
      DroneProb: 0.4
      DistTypeCylinder:
        MaxRadius: 12
        YVariance: 10
      
    - Name: CobaltResource
      CountMinMax: [ 0, 3 ]
      SizeMinMax: [ 5, 9 ]
      DepthMinMax: [ 0, 1 ]
      DroneProb: 0.4
      DistTypeCylinder:
        MaxRadius: 8
        YVariance: 10
      
    - Name: SathiumResource #rich
      CountMinMax: [ 4, 7 ]
      SizeMinMax: [ 8, 12 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 0.9
      MaxDroneCount: 0 
      DistTypeWorm:
        FreqDirChange: 0.5  
        DirChangeMagnitude: 0.2 
        MaxLength: 50
        DeepnessType: 1 

    - Name: NeodymiumResource #small
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 5, 9 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 0.9
      MaxDroneCount: 0 
      DistTypeCylinder:
        MaxRadius: 15
        YVariance: 15

    - Name: GoldResource #small
      CountMinMax: [ 0, 2 ]
      SizeMinMax: [ 5, 9 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 0.7
      MaxDroneCount: 5
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 20

