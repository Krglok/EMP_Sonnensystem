# Playfield Characteristics
RealRadius: 1303.797294             
ScaledRadius: 1300                  
Gravity: -5.81                      
AtmosphereDensity: 0.6
AtmosphereO2: 0.1                   
AtmosphereBreathable: False     
TemperatureDay: 45     # was 45, +20 for additional playfield height.               
TemperatureNight: -5   # was -5, +15 for additional playfield height.              
Music: desert
#Music: default
Radiation: 0.5
DayLength: 24                       
PlanetType: Desert                  
Moons: 2
Water: WaterGreen                   
SeaLevel: 1 #82  # was 47, +40                       
PvP: True                          
Seed: 123456                       
#UseFixed: False

# Playfield Difficulty 
Difficulty: 5

# Planet or Space
PlayfieldType: Planet    
Description: "Mars ist der 4te Planet des Sonnensystems. Trocken, mit einer sehr dünnen Atmosphaere.\n
  Der Planet wird von Drohnen bewacht. Nur selten kommen Alien hierher.\n
  Es soll eine geheime Basis der UNSF hier geben.\n
  Sei gewarnt. Der Planet vergibt keinen Fehler. Kein Wasser keine atembare Atmosophaere.\n\n
  "  

# Sun                               
SunFlare: EnvironmentalEffects/SunFlareWhite2

# Atmosphere and Sky
AtmosphereEnabled: True   
AtmosphereColor: "0.19, 0.26, 0.35" 
SkyColor: "1, 1, 1"                 
SkyHorizonColor: "1, 0.5, 0"        

# Light
DayLightIntensity: 1.4              
NightLightIntensity: 0.5            
DayShadowStrength: 0.95       
NightLightColor: "0.7, 0.7, 1"     # Color of moon light, default is blueish "0.67,0.65,0.99"        

# Fog
AtmosphereFog: 0.3     
FogCloudIntensity: 1.0                
FogIntensity: 0.1                   
FogStartDistance: 400               
GroundFogIntensity: 0               
GroundFogHeight: 0                  

# Clouds
CloudsDensity: 0.4                 
CloudsSharpness: 0.3               
CloudsBrightness: 1.0              
CloudsOpacity: 1.0                  
CloudsZenithColor: "0.87, 0.92, 1"  
CloudsHorizonColor: "1, 0.3, 0"     

# Wind Speed
WindSpeed: 4                        

