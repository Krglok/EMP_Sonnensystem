  - ['0, 0, 0', Tallodar Orbit, TallodarSpaceAsteroidFieldRing]
  - ['0, 0, 0', Tallodar, TallodarNewTemperate3, 'Human:1'] #OK5
  - ['-2000, -5000, 9000', Tallodar Moon, TallodarNewMoon] 
