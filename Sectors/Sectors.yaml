#===================================================
#   Simulation des Sonnensystems mit den Planeten
#   und den wichtigsten Monden
#   Der 3te Planet ist nicht besonders originalgetreu.
#   Die Umlaufbahnebene ist x, z.
Die Entfernung sind 3x  gemacht da die inneren PLaneten unter 1 AE in der Umlaufbahn haben.
#===================================================
# Sectors MP
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs: http://yaml.org/faq.html
# Default starter planets on a Dedicated Server are Akua, Omicron, Ningues and Masperon. 'Origin:Number' behind playfield template sets starter planet [ "0, 0, 0", Akua, Temperate, 'Human:1' ]
# Allow and Deny lists: If “Allow” is set, sectors that are given in list are accessible in addition to those that are close enough. If “Deny” is set, sectors that are given in list are not accessible.
# Available Icons: Circle, Kite, Rhombus, Pentagon, Square, Star, Triangle, Hexagon

- Coordinates: [0, 30, 0]
  Color: 0, 0, 0
  Playfields:
  - ['0, 0, 0', Sun, Sun]
#===================================================
#   Startplanet ausserhalb des Szenarios Erde
- Coordinates: [155, -100, -164]
  Color: 0.37, 0.33, 0.04
  Icon: Circle
  OrbitLine: True
  Deny: [Masperon Orbit]
